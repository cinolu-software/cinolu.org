<div class="block space-y-2.5">
  @if (label()) {
  <label class="block text-sm font-semibold text-slate-700" [attr.for]="inputId() || null">{{ label() }}</label>
  }

  <div
    class="rounded-lg border bg-white transition-colors"
    [class.border-red-300]="!!error()"
    [class.border-slate-200]="!error()"
    [class.bg-slate-100]="disabled()">
    <ng-content />
  </div>

  @if (error()) {
  <span class="block text-xs font-medium text-red-600">{{ error() }}</span>
  }
</div>
