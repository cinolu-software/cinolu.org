<div class="bg-grid bg-gray-50 overflow-hidden">
  <section
    class="py-12 lg:py-20 px-8 lg:px-16 xl:px-24 2xl:px-32 max-w-screen-2xl mx-auto fade-left-init"
    id="events"
    appAnimationsOnScroll>
    <app-landing-section-header
      badgeKey="recent_events.badge"
      titleKey="recent_events.title"
      titleHighlightKey="recent_events.title_highlight"
      descriptionKey="recent_events.description">
      <div headerEnd class="hidden lg:flex items-center gap-4 shrink-0">
        @if (store.events().length) {
        <button (click)="carousel.navBackward($event)" class="carousel-nav-btn" type="button">
          <i-lucide [name]="icons.arrowLeft" class="size-3.5" />
        </button>
        <button (click)="carousel.navForward($event)" class="carousel-nav-btn" type="button">
          <i-lucide [name]="icons.arrowRight" class="size-3.5" />
        </button>
        }
      </div>
    </app-landing-section-header>

    @if (store.isLoading()) {
    <div class="mt-8 grid grid-cols-1 gap-x-5 gap-y-10 md:grid-cols-2 xl:grid-cols-3 pb-10">
      @for (skeleton of [1, 2, 3]; track skeleton) {
      <app-event-card-skeleton />
      }
    </div>
    }
    <div class="space-y-6 lg:space-y-8 mt-8 lg:mt-12">
      <p-carousel
        #carousel
        [value]="store.events()"
        [numVisible]="3"
        [numScroll]="1"
        [showIndicators]="false"
        [showNavigators]="false"
        [circular]="true"
        [responsiveOptions]="carouselConfig"
        [autoplayInterval]="5000"
        [draggable]="true"
        class="w-full events-carousel">
        <ng-template let-event #item>
          <div class="carousel-item-wrapper">
            <app-event-card [event]="event" [buttonTextKey]="'recent_events.explore'" />
          </div>
        </ng-template>
      </p-carousel>

      @if (store.events().length) {
      <div class="flex lg:hidden justify-center items-center gap-6 pt-4">
        <button (click)="carousel.navBackward($event)" class="carousel-nav-btn" type="button">
          <i-lucide [name]="icons.arrowLeft" class="size-4" />
        </button>
        <button (click)="carousel.navForward($event)" class="carousel-nav-btn" type="button">
          <i-lucide [name]="icons.arrowRight" class="size-4" />
        </button>
      </div>
      }

      <div class="w-full flex justify-center items-center font-satoshi mt-12">
        <a routerLink="/events" class="group relative">
          <button
            class="relative flex items-center gap-3 px-8 py-4 bg-white border-2 border-primary-500 text-primary-600 text-base font-semibold rounded-full hover:bg-primary-50 transition-all duration-300 hover:shadow-lg hover:shadow-primary-500/25">
            <span>{{ 'recent_events.view_all' | translate }}</span>
            <i-lucide
              class="size-5 group-hover:translate-x-1 transition-transform duration-300"
              [name]="icons.arrowRight" />
          </button>
        </a>
      </div>
    </div>
  </section>
</div>
