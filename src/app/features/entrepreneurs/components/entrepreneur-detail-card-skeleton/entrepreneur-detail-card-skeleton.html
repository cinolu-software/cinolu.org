<div
  class="min-h-screen bg-[radial-gradient(at_top_right,_var(--tw-gradient-stops))] from-slate-50 via-white to-slate-50 py-20 mt-10 lg:py-24 animate-pulse">
  <div class="max-w-7xl mx-auto px-6 lg:px-0">
    <!-- Hero card -->
    <div class="relative mb-12">
      <div class="bg-white/70 backdrop-blur-xl border border-slate-200/60 rounded-lg p-8 overflow-hidden">
        <div class="flex flex-col lg:flex-row lg:items-center gap-8">
          <div class="relative shrink-0 mx-auto lg:mx-0">
            <div class="size-32 rounded-lg bg-slate-200"></div>
            <div class="absolute -bottom-1 -right-1 size-6 rounded-full border-4 border-white bg-slate-300"></div>
          </div>
          <div class="flex-1 space-y-4 text-center lg:text-left">
            <div class="h-10 bg-slate-200 rounded-lg w-3/4 max-w-sm mx-auto lg:mx-0"></div>
            <div class="flex flex-wrap justify-center lg:justify-start gap-2">
              <div class="h-6 w-24 bg-slate-100 rounded-md"></div>
              <div class="h-6 w-20 bg-slate-100 rounded-md"></div>
            </div>
            <div class="flex justify-center lg:justify-start gap-2 pt-2">
              <div class="size-10 rounded-lg bg-slate-100"></div>
              <div class="size-10 rounded-lg bg-slate-100"></div>
              <div class="h-10 w-36 rounded-lg bg-slate-200"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="w-full space-y-8">
      <!-- Section Le Parcours -->
      <section class="bg-white rounded-lg border border-slate-200 overflow-hidden">
        <div class="flex items-center justify-between p-6">
          <div class="flex items-center gap-3">
            <div class="size-8 rounded bg-slate-100"></div>
            <div class="h-6 w-32 bg-slate-200 rounded"></div>
          </div>
          <div class="size-5 rounded bg-slate-100"></div>
        </div>
        <div class="px-6 pb-6 pt-0">
          <div class="space-y-2 border-l-4 border-slate-100 pl-6">
            <div class="h-4 bg-slate-100 rounded w-full"></div>
            <div class="h-4 bg-slate-100 rounded w-5/6"></div>
            <div class="h-4 bg-slate-100 rounded w-4/5"></div>
          </div>
        </div>
      </section>

      <!-- Section L'Entreprise -->
      <section class="w-full">
        <div class="flex items-center gap-3 mb-6">
          <div class="size-8 rounded bg-slate-100"></div>
          <div class="h-6 w-40 bg-slate-200 rounded"></div>
        </div>

        <div class="space-y-6">
          <!-- Overview card -->
          <div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
            <div class="h-40 bg-slate-100"></div>
            <div class="p-6">
              <div class="flex items-center gap-4">
                <div class="size-16 rounded-xl bg-slate-200"></div>
                <div class="flex-1 space-y-2">
                  <div class="h-7 w-48 bg-slate-200 rounded"></div>
                  <div class="flex gap-2">
                    <div class="h-6 w-16 bg-slate-100 rounded-md"></div>
                    <div class="h-6 w-14 bg-slate-100 rounded-md"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Description + Problem/Market placeholders -->
          <div class="grid sm:grid-cols-2 gap-4">
            <div class="bg-white rounded-lg border border-slate-200 p-6 h-36">
              <div class="h-4 w-28 bg-slate-200 rounded mb-4"></div>
              <div class="space-y-2">
                <div class="h-3 bg-slate-100 rounded w-full"></div>
                <div class="h-3 bg-slate-100 rounded w-5/6"></div>
              </div>
            </div>
            <div class="bg-white rounded-lg border border-slate-200 p-6 h-36">
              <div class="h-4 w-24 bg-slate-200 rounded mb-4"></div>
              <div class="space-y-2">
                <div class="h-3 bg-slate-100 rounded w-full"></div>
                <div class="h-3 bg-slate-100 rounded w-4/5"></div>
              </div>
            </div>
          </div>

          <!-- Gallery grid placeholder -->
          <div class="bg-white rounded-lg border border-slate-200 p-6">
            <div class="h-4 w-20 bg-slate-200 rounded mb-4"></div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
              @for (i of [1,2,3,4]; track i) {
              <div class="aspect-square rounded-lg bg-slate-100"></div>
              }
            </div>
          </div>

          <!-- CTA placeholder -->
          <div class="bg-white rounded-lg border border-slate-200 p-6">
            <div class="h-11 w-44 bg-slate-200 rounded-lg"></div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
